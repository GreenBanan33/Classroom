<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    
    <meta property="og:title" content="Classroom - Portal Interactivo">
    <meta property="og:description" content="Accede a los recursos y materiales de la clase.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80">
    <meta property="og:url" content="https://greenbanan33.github.io/Classroom/">
    <meta name="theme-color" content="#4CAF50">
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">

    <style>
        /* VARIABLES DE COLOR */
        :root {
            --bg-principal: radial-gradient(circle, #1e1e1e 0%, #121212 100%);
            --color-texto: white;
            --color-subtexto: #aaa;
            --bg-boton: #2c2c2c;
            --borde-boton: #444;
            --color-texto-boton: #e0e0e0;
            --bg-barra: #1a1a1a;
        }

        /* MODO CLARO */
        body.modo-claro {
            --bg-principal: radial-gradient(circle, #fdfdfd 0%, #e0e0e0 100%);
            --color-texto: #121212;
            --color-subtexto: #555;
            --bg-boton: #ffffff;
            --borde-boton: #ccc;
            --color-texto-boton: #333;
            --bg-barra: #f0f0f0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-principal); font-family: 'Segoe UI', sans-serif;
            color: var(--color-texto); overflow: hidden; transition: all 0.3s ease;
        }
        
        /* --- PANTALLA PRINCIPAL (MENÚ) --- */
        #pantalla-menu {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; text-align: center; position: relative;
        }

        #btn-tema {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; font-size: 2rem;
            cursor: pointer; transition: transform 0.2s;
        }
        #btn-tema:hover { transform: scale(1.1); }

        #pantalla-menu h1 {
            font-size: 3.5rem; margin-bottom: 5px; color: #4CAF50; letter-spacing: 2px;
        }

        #pantalla-menu p {
            margin-bottom: 40px; color: var(--color-subtexto); font-size: 1.2rem;
        }

        .grid-juegos {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
            max-width: 800px; width: 90%;
        }

        .btn-juego {
            background-color: var(--bg-boton); color: var(--color-texto-boton); 
            border: 2px solid var(--borde-boton); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px 20px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border-radius: 12px; transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }

        .btn-juego:hover {
            background-color: #4CAF50; color: white; border-color: #4CAF50;
            transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-juego span { font-size: 2.5rem; }

        /* --- PANTALLA DE JUEGO --- */
        #pantalla-juego {
            display: none; flex-direction: column; height: 100vh; width: 100%;
        }

        #barra-juego {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-barra); padding: 10px 20px; border-bottom: 1px solid var(--borde-boton);
            height: 40px;
        }

        .btn-pequeno {
            background-color: #333; color: white; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        
        .btn-volver { background-color: #e53935; }
        .btn-volver:hover { background-color: #c62828; }
        
        .btn-compartir { background-color: #1DA1F2; margin-top: 30px;}
        .btn-compartir:hover { background-color: #0c85d0; }

        iframe { 
            width: 100%; height: calc(100vh - 60px); 
            border: none; background-color: #000;
        }
    </style>
</head>
<body>

    <div id="pantalla-menu">
        <button id="btn-tema" onclick="cambiarTema()">🌗</button>

        <h1>Classroom</h1>
        <p>Selecciona tu juego</p>
        
        <div class="grid-juegos">
            <button class="btn-juego" onclick="abrirJuego('https://retro-bowl-unblocked1.github.io/')">
                <span>🏈</span> Retro Bowl
            </button>
            <button class="btn-juego" onclick="abrirJuego('https://y8.com/embed/slope')">
                <span>🎳</span> Slope
            </button>
            <button class="btn-juego" onclick="abrirJuego('https://tetris.com/play-tetris')">
                <span>🧱</span> Tetris
            </button>
            <button class="btn-juego" onclick="abrirJuego('https://mathadventure1.github.io/ice-dodo/')">
                <span>🧊</span> Ice Dodo
            </button>
            <button class="btn-juego" onclick="abrirJuego('https://sz-games.github.io/Ice-Dodo/')">
                <span>🎮</span> More Games
            </button>
        </div>
        
        <button class="btn-pequeno btn-compartir" onclick="compartirWeb()">📲 Compartir Web</button>
    </div>

    <div id="pantalla-juego">
        <div id="barra-juego">
            <button class="btn-pequeno btn-volver" onclick="volverMenu()">⬅ Volver al Menú</button>
            <button class="btn-pequeno" style="background-color: #1DA1F2;" onclick="compartirWeb()">📲 Compartir</button>
        </div>
        <iframe id="iframe-juego" src="" allowfullscreen></iframe>
    </div>

    <script>
        function abrirJuego(url) {
            document.getElementById('pantalla-menu').style.display = 'none';
