<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    <style>
        /* Variables para Modo Claro / Oscuro */
        :root {
            --bg-principal: #121212;
            --color-texto: white;
            --color-borde: #444;
            --bg-barra: #1a1a1a;
        }

        body.modo-claro {
            --bg-principal: #f0f0f0;
            --color-texto: #121212;
            --color-borde: #ccc;
            --bg-barra: #e0e0e0;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-principal);
            color: var(--color-texto);
            font-family: 'Segoe UI', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Contenedor del menú principal */
        #pantalla-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Cabecera con Título y Botón Tema */
        .cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .cabecera h1 {
            margin: 0;
            color: #4CAF50;
            font-size: 3.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #btn-tema {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #btn-tema:hover { transform: scale(1.1); }

        /* Rejilla de Juegos (2 Columnas) */
        .grid-juegos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        /* Estilo de los Botones de Juego */
        .btn-juego {
            height: 130px;
            border-radius: 12px;
            border: 2px solid var(--color-borde);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0,0,0,1); /* Sombra para leer bien el texto */
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .btn-juego:hover {
            transform: scale(1.03);
            border-color: #4CAF50;
        }

        /* Imágenes fijas para cada juego */
        .img-retro { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://a.espncdn.com/combiner/i?img=/i/gamecast/games/retrobowl/logo.png'); }
        .img-slope { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://img.poki.com/cdn-cgi/image/quality=78,width=600,height=600,fit=cover,f=auto/b8782a22543d2c92e92552e693b84128.png'); }
        .img-tetris { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.igdb.com/igdb/image/upload/t_cover_big/co1yeo.jpg'); }
        .img-1v1 { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://img.poki.com/cdn-cgi/image/quality=78,width=600,height=600,fit=cover,f=auto/877bf40049d1bb8cb18d0afcae55c3c0.png'); }
        .img-more { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600'); }

        /* Botón Compartir */
        .btn-compartir {
            margin-top: 30px;
            background-color: #1DA1F2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-compartir:hover { background-color: #0c85d0; }

        /* Pantalla del Juego (Iframe) */
        #pantalla-juego {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        .barra-juego {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--bg-barra);
            border-bottom: 2px solid var(--color-borde);
        }

        .btn-pequeno {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-pequeno:hover { background-color: #c62828; }

        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background-color: black;
        }
    </style>
</head>
<body>

    <div id="pantalla-menu">
        <div class="cabecera">
            <h1>Classroom</h1>
            <button id="btn-tema" onclick="cambiarTema()" title="Cambiar Tema">🌗</button>
        </div>

        <div class="grid-juegos">
            <div class="btn-juego img-retro" onclick="abrirJuego('https://retro-bowl-unblocked1.github.io/')">Retro Bowl</div>
            <div class="btn-juego img-slope" onclick="abrirJuego('https://y8.com/embed/slope')">Slope</div>
            <div class="btn-juego img-tetris" onclick="abrirJuego('https://tetris.com/play-tetris')">Tetris</div>
            
            <div class="btn-juego img-1v1" onclick="window.open('https://play.1v1.lol/', '_blank')">1v1.lol</div>
            
            <div class="btn-juego img-more" onclick="abrirJuego('https://sz-games.github.io/Ice-Dodo/')">More Games</div>
        </div>

        <button class="btn-compartir" onclick="compartirWeb()">📲 Compartir Web</button>
    </div>

    <div id="pantalla-juego">
        <div class="barra-juego">
            <button class="btn-pequeno" onclick="cerrarJuego()">⬅ Volver al Menú</button>
            <button class="btn-pequeno" style="background-color: #1DA1F2;" onclick="compartirWeb()">📲 Compartir</button>
        </div>
        <iframe id="iframe-juego" src=""></iframe>
    </div>

    <script>
        // Abrir juego en el iframe
        function abrirJuego(url) {
            document.getElementById('pantalla-menu').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'flex';
            document.getElementById('iframe-juego').src = url;
        }

        // Cerrar el iframe y volver al menú
        function cerrarJuego() {
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-menu').style.display = 'flex';
            document.getElementById('iframe-juego').src = '';
        }

        // Cambiar entre modo claro y oscuro
        function cambiarTema() {
            document.body.classList.toggle('modo-claro');
        }

        // Función para el botón compartir
        function compartirWeb() {
            if (navigator.share) {
                navigator.share({
                    title: 'Classroom - Portal Interactivo',
                    url: window.location.href
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('¡Enlace copiado al portapapeles!');
            }
        }
    </script>
</body>
</html>
