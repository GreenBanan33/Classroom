<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        :root {
            --bg-gradiente: linear-gradient(135deg, #2c3e50, #000000);
            --color-texto: white;
            --color-borde: #444;
            --bg-btn: rgba(255, 255, 255, 0.05); /* Botones semi-transparentes */
            --brillo-hover: rgba(255, 255, 255, 0.8);
        }

        body.modo-claro {
            --bg-gradiente: linear-gradient(135deg, #e0e0e0, #ffffff);
            --color-texto: #121212;
            --color-borde: #ccc;
            --bg-btn: rgba(0, 0, 0, 0.05);
            --brillo-hover: rgba(0, 0, 0, 0.4);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-gradiente);
            background-attachment: fixed;
            color: var(--color-texto);
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
        }

        /* --- MENÚ --- */
        #pantalla-menu {
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; box-sizing: border-box; min-height: 100vh;
        }

        .cabecera {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 700px; margin-bottom: 30px;
        }

        .cabecera h1 {
            margin: 0; color: #4CAF50; font-size: 3rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #btn-tema { background: none; border: none; font-size: 2rem; cursor: pointer; }

        /* Rejilla de Juegos */
        .grid-juegos {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            width: 100%; max-width: 700px;
        }

        /* Botones con efecto de iluminación */
        .btn-juego {
            height: 120px; border-radius: 15px;
            border: 1px solid var(--color-borde);
            background-color: var(--bg-btn);
            backdrop-filter: blur(5px); /* Efecto cristalizado */
            display: flex; align-items: center; justify-content: center;
            color: var(--color-texto); font-size: 1.4rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease;
            text-align: center;
        }

        .btn-juego:hover {
            transform: translateY(-5px);
            border-color: var(--brillo-hover);
            box-shadow: 0 0 20px var(--brillo-hover);
            color: #4CAF50;
        }

        /* --- PANTALLA JUEGO CENTRADA --- */
        #pantalla-juego {
            display: none; flex-direction: column; height: 100vh; width: 100%;
            background-color: #000;
        }

        .barra-juego {
            display: flex; justify-content: space-between; padding: 10px 20px;
            background: #1a1a1a; align-items: center;
        }

        .btn-volver {
            background-color: #e53935; color: white; border: none;
            padding: 10px 20px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }

        /* Contenedor para centrar el Slope y otros juegos */
        .contenedor-iframe {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
            background-color: #000;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            max-width: 1000px; /* Evita que se estire demasiado en pantallas gigantes */
            max-height: 80vh; 
        }

        .btn-compartir {
            margin-top: 40px; background-color: #1DA1F2; color: white;
            border: none; padding: 12px 30px; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="pantalla-menu">
        <div class="cabecera">
            <h1>Classroom</h1>
            <button id="btn-tema" onclick="cambiarTema()">🌗</button>
        </div>

        <div class="grid-juegos">
            <div class="btn-juego" onclick="abrirJuego('https://retro-bowl-unblocked1.github.io/')">Retro Bowl</div>
            <div class="btn-juego" onclick="abrirJuego('https://y8.com/embed/slope')">Slope</div>
            <div class="btn-juego" onclick="abrirJuego('https://tetris.com/play-tetris')">Tetris</div>
            <div class="btn-juego" onclick="abrirJuego('https://poki.com/en/g/google-feud')">Google Feud</div> <div class="btn-juego" onclick="abrirJuego('https://wayou.github.io/t-rex-runner/')">Chrome Dino</div>
            <div class="btn-juego" onclick="abrirJuego('https://macek.github.io/google_pacman/')">Pac-Man</div>
        </div>

        <button class="btn-compartir" onclick="compartirWeb()">📲 Compartir Classroom</button>
    </div>

    <div id="pantalla-juego">
        <div class="barra-juego">
            <button class="btn-volver" onclick="cerrarJuego()">⬅ Volver al Menú</button>
            <span id="titulo-juego" style="color: white; font-weight: bold;">Cargando...</span>
        </div>
        <div class="contenedor-iframe">
            <iframe id="iframe-juego" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function abrirJuego(url) {
            document.getElementById('pantalla-menu').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'flex';
            document.getElementById('iframe-juego').src = url;
            document.getElementById('titulo-juego').innerText = "Modo Concentración";
        }

        function cerrarJuego() {
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-menu').style.display = 'flex';
            document.getElementById('iframe-juego').src = '';
        }

        function cambiarTema() {
            document.body.classList.toggle('modo-claro');
        }

        function compartirWeb() {
            const url = window.location.href;
            navigator.clipboard.writeText(url);
            alert('¡Enlace copiado! Pásalo a tus amigos.');
        }
    </script>
</body>
</html>
