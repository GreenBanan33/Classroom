<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    
    <meta property="og:title" content="Classroom - Portal Interactivo">
    <meta property="og:description" content="Accede a los recursos y materiales de la clase.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80">
    <meta property="og:url" content="https://greenbanan33.github.io/Classroom/">
    <meta name="theme-color" content="#4CAF50">
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">

    <style>
        /* Variables de color */
        :root {
            --bg-principal: #121212;
            --color-texto: white;
            --color-subtexto: #aaa;
            --bg-barra: #1a1a1a;
            --borde-boton: #444;
        }

        body.modo-claro {
            --bg-principal: #f0f0f0;
            --color-texto: #121212;
            --color-subtexto: #444;
            --bg-barra: #e0e0e0;
            --borde-boton: #ccc;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-principal); font-family: 'Segoe UI', sans-serif;
            color: var(--color-texto); overflow: hidden; transition: all 0.3s ease;
        }
        
        /* --- PANTALLA MENÚ --- */
        #pantalla-menu {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; text-align: center; position: relative;
        }

        #btn-tema {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; font-size: 2rem;
            cursor: pointer; transition: transform 0.2s;
        }
        #btn-tema:hover { transform: scale(1.1); }

        #pantalla-menu h1 {
            font-size: 3.5rem; margin-bottom: 5px; color: #4CAF50; letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #pantalla-menu p {
            margin-bottom: 40px; color: var(--color-subtexto); font-size: 1.2rem;
        }

        /* Cuadrícula de juegos */
        .grid-juegos {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            max-width: 700px; width: 90%;
        }

        /* Diseño de los botones con imagen */
        .btn-juego {
            border: 2px solid var(--borde-boton); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            height: 150px; /* Altura del botón para que se vea la imagen */
            border-radius: 12px; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
            background-size: cover; background-position: center;
            color: white; font-size: 1.8rem; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9); /* Sombra al texto para que lea bien */
        }

        .btn-juego:hover {
            transform: translateY(-5px) scale(1.03); 
            border-color: #4CAF50;
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        /* Fondos de imágenes reales para cada juego */
        .bg-retro { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1587280501635-68a0e82cd5ff?w=600&q=80'); }
        .bg-slope { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=600&q=80'); }
        .bg-tetris { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1615967733481-9b1d8d3f18e9?w=600&q=80'); }
        .bg-icedodo { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1518131346399-5285741f23ee?w=600&q=80'); }
        .bg-more { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600&q=80'); }

        /* --- PANTALLA JUEGO --- */
        #pantalla-juego {
            display: none; flex-direction: column; height: 100vh; width: 100%;
        }

        #barra-juego {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-barra); padding: 10px 20px; border-bottom: 1px solid var(--borde-boton);
            height: 40px;
        }

        .btn-pequeno {
            background-color: #333; color: white; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-volver { background-color: #e53935; }
        .btn-volver:hover { background-color: #c62828; }
        
        .btn-compartir { background-color: #1DA1F2; margin-top: 30px;}
        .btn-compartir:hover { background-color: #0c85d0; }

        iframe { 
            width: 100%; height: calc(100vh - 60px); 
            border: none; background-color: #000;
        }
    </style>
</head>
<body>

    <div id="pantalla-menu">
        <button id="btn-tema" onclick="cambiarTema()" title="Cambiar Tema">🌗</button>

        <h1>Classroom</h1>
        <p>Selecciona tu juego</p>
        
        <div class="grid-juegos">
            <div class="btn-juego bg-retro" onclick="abrirJuego('https://retro-bowl-unblocked1.github.io/')">Retro Bowl</div>
            <div class="btn-juego bg-slope" onclick="abrirJuego('https://y8.com/embed/slope')">Slope</div>
            <div class="btn-juego bg-tetris" onclick="abrirJuego('https://tetris.com/play-tetris')">Tetris</div>
            <div class="btn-juego bg-icedodo" onclick="abrirJuego('https://classroom-6x.github.io/ice-dodo/')">Ice Dodo</div>
            <div class="btn-juego bg-more" onclick="abrirJuego('https://sz-games.github.io/Ice-Dodo/')">More Games</div>
        </div>
        
        <button class="btn-pequeno btn-compartir" onclick="compartirWeb()">📲 Compartir Web</button>
    </div>

    <div id="pantalla-juego">
        <div id="barra-juego">
            <button class="btn-pequeno btn-volver" onclick="volverMenu()">⬅ Volver al Menú</button>
            <button class="btn-pequeno" style="background-color: #1DA1F2;" onclick="compartirWeb()">📲 Compartir</button>
        </div>
        <iframe id="iframe-juego" src="" allowfullscreen></iframe>
    </div>

    <script>
        function abrirJuego(url) {
            document.getElementById('pantalla-menu').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'flex';
            document.getElementById('iframe-juego').src = url;
        }

        function volverMenu() {
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-menu').style.display = 'flex';
            document.getElementById('iframe-juego').src = '';
        }

        function compartirWeb() {
            if (navigator.share) {
                navigator.share({
                    title: 'Classroom - Portal Interactivo',
                    url: 'https://greenbanan33.github.io/Classroom/'
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText('https://greenbanan33.github.io/Classroom/');
                alert('¡Enlace copiado!');
            }
        }

        function cambiarTema() {
            document.body.classList.toggle('modo-claro');
        }
    </script>

    var sc_security="81904266"; 
    </script>
    <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>
</body>
</html>
