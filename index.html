<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    
    <meta property="og:title" content="Classroom - Portal Interactivo">
    <meta property="og:description" content="Accede a los recursos y materiales de la clase.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80">
    <meta property="og:url" content="https://greenbanan33.github.io/Classroom/">
    <meta name="theme-color" content="#4CAF50">
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #121212; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
        }
        
        /* --- PANTALLA PRINCIPAL (MENÚ) --- */
        #pantalla-menu {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; text-align: center;
            background: radial-gradient(circle, #1e1e1e 0%, #121212 100%);
        }

        #pantalla-menu h1 {
            font-size: 3rem; margin-bottom: 5px; color: #4CAF50; letter-spacing: 2px;
        }

        #pantalla-menu p {
            margin-bottom: 40px; color: #aaa; font-size: 1.2rem;
        }

        .grid-juegos {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            max-width: 600px; width: 90%;
        }

        .btn-juego {
            background-color: #2c2c2c; color: #e0e0e0; border: 2px solid #444;
            padding: 30px 20px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border-radius: 12px; transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }

        .btn-juego:hover {
            background-color: #4CAF50; color: white; border-color: #4CAF50;
            transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-juego span { font-size: 2.5rem; } /* Tamaño del emoji */

        /* --- PANTALLA DE JUEGO (OCULTA AL INICIO) --- */
        #pantalla-juego {
            display: none; flex-direction: column; height: 100vh; width: 100%;
        }

        #barra-juego {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #1a1a1a; padding: 10px 20px; border-bottom: 1px solid #333;
            height: 40px;
        }

        .btn-pequeno {
            background-color: #333; color: white; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }

        .btn-pequeno:hover { background-color: #555; }
        
        .btn-volver { background-color: #e53935; }
        .btn-volver:hover { background-color: #c62828; }
        
        .btn-compartir { background-color: #1DA1F2; margin-top: 30px;}
        .btn-compartir:hover { background-color: #0c85d0; }

        iframe { 
            width: 100%; height: calc(100vh - 60px); 
            border: none; background-color: #000;
        }
    </style>
</head>
<body>

    <div id="pantalla-menu">
        <h1>Classroom</h1>
        <p>Selecciona tu juego</p>
        
        <div class="grid-juegos">
            <button class="btn-juego" onclick="abrirJuego('https://retro-bowl-unblocked1.github.io/')">
                <span>🏈</span> Retro Bowl
            </button>
            <button class="btn-juego" onclick="abrirJuego('https://y8.com/embed/slope')">
                <span>🎳</span> Slope
            </button>
            <button class="btn-juego" onclick="abrirJuego('https://tetris.com/play-tetris')">
                <span>🧱</span> Tetris
            </button>
            <button class="btn-juego" onclick="abrirJuego('https://sz-games.github.io/Ice-Dodo/')">
                <span>🧊</span> Ice Dodo
            </button>
        </div>
        
        <button class="btn-pequeno btn-compartir" onclick="compartirWeb()">📲 Compartir Web</button>
    </div>

    <div id="pantalla-juego">
        <div id="barra-juego">
            <button class="btn-pequeno btn-volver" onclick="volverMenu()">⬅ Volver al Menú</button>
            <button class="btn-pequeno" style="background-color: #1DA1F2;" onclick="compartirWeb()">📲 Compartir</button>
        </div>
        <iframe id="iframe-juego" src="" allowfullscreen></iframe>
    </div>

    <script>
        function abrirJuego(url) {
            // Ocultar el menú de botones y mostrar la zona del juego
            document.getElementById('pantalla-menu').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'flex';
            // Ponerle al iframe la dirección del juego elegido
            document.getElementById('iframe-juego').src = url;
        }

        function volverMenu() {
            // Ocultar la zona de juego y volver a mostrar el menú
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-menu').style.display = 'flex';
            // Borrar el juego del iframe (para que deje de sonar la música de fondo)
            document.getElementById('iframe-juego').src = '';
        }

        function compartirWeb() {
            if (navigator.share) {
                navigator.share({
                    title: 'Classroom - Portal Interactivo',
                    text: '¡Mira esta página secreta con juegos clásicos!',
                    url: 'https://greenbanan33.github.io/Classroom/'
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText('https://greenbanan33.github.io/Classroom/');
                alert('¡Enlace copiado! Ya puedes pegarlo y enviárselo a tus amigos.');
            }
        }
    </script>

    <script type="text/javascript">
    var sc_project=13210634; 
    var sc_invisible=1; 
    var sc_security="81904266"; 
    </script>

    <noscript>
        <div class="statcounter">
            <a title="Web Analytics" href="https://statcounter.com/" target="_blank">
                <img class="statcounter" src="https://c.statcounter.com/13210634/0/81904266/1/" alt="Web Analytics" referrerPolicy="no-referrer-when-downgrade">
            </a>
        </div>
    </noscript>

</body>
</html>
