<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    <style>
        :root { --bg-principal: #121212; --color-texto: white; }
        body { margin: 0; background-color: var(--bg-principal); font-family: sans-serif; color: var(--color-texto); display: flex; flex-direction: column; align-items: center; }
        
        h1 { color: #4CAF50; font-size: 3rem; margin-top: 20px; }
        
        .grid-juegos {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            max-width: 800px; width: 90%; margin-top: 20px;
        }

        .btn-juego {
            height: 150px; border-radius: 12px; cursor: pointer;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 8px black;
            border: 2px solid #444; transition: 0.3s;
        }
        .btn-juego:hover { transform: scale(1.05); border-color: #4CAF50; }

        /* Imágenes fijas para cada botón */
        .bg-retro { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1587280501635-68a0e82cd5ff?w=600'); }
        .bg-slope { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://img.poki.com/cdn-cgi/image/quality=78,width=600,height=600,fit=cover,f=auto/b8782a22543d2c92e92552e693b84128.png'); }
        .bg-tetris { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.igdb.com/igdb/image/upload/t_cover_big/co1yeo.jpg'); }
        .bg-1v1 { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://img.poki.com/cdn-cgi/image/quality=78,width=600,height=600,fit=cover,f=auto/877bf40049d1bb8cb18d0afcae55c3c0.png'); }
        .bg-more { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600'); }

        #pantalla-juego { display: none; width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn-volver { position: absolute; top: 10px; left: 10px; padding: 10px; background: red; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pantalla-menu">
        <h1>Classroom</h1>
        <div class="grid-juegos">
            <div class="btn-juego bg-retro" onclick="abrir('https://retro-bowl-unblocked1.github.io/')">Retro Bowl</div>
            <div class="btn-juego bg-slope" onclick="abrir('https://y8.com/embed/slope')">Slope</div>
            <div class="btn-juego bg-tetris" onclick="abrir('https://tetris.com/play-tetris')">Tetris</div>
            <div class="btn-juego bg-1v1" onclick="abrir('https://1v1.lol/')">1v1.lol</div>
            <div class="btn-juego bg-more" onclick="abrir('https://sz-games.github.io/Ice-Dodo/')">More Games</div>
        </div>
    </div>

    <div id="pantalla-juego">
        <button class="btn-volver" onclick="cerrar()">⬅ Volver</button>
        <iframe id="iframe-juego" src=""></iframe>
    </div>

    <script>
        function abrir(url) {
            document.getElementById('pantalla-menu').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'block';
            document.getElementById('iframe-juego').src = url;
        }
        function cerrar() {
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-menu').style.display = 'block';
            document.getElementById('iframe-juego').src = '';
        }
    </script>
</body>
</html>
