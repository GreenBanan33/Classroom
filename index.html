<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <style>
        :root {
            /* Fondo gradient suave de color gris oscuro/pizarra */
            --bg-gradiente: linear-gradient(135deg, #4b5563, #1f2937);
            --color-texto: white;
            --color-borde: rgba(255, 255, 255, 0.2);
            --bg-btn: rgba(255, 255, 255, 0.1);
            --brillo-hover: rgba(255, 255, 255, 0.7);
        }

        body.modo-claro {
            /* Fondo gradient suave de color gris claro */
            --bg-gradiente: linear-gradient(135deg, #f3f4f6, #9ca3af);
            --color-texto: #121212;
            --color-borde: rgba(0, 0, 0, 0.2);
            --bg-btn: rgba(0, 0, 0, 0.05);
            --brillo-hover: rgba(0, 0, 0, 0.4);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg-gradiente);
            background-attachment: fixed;
            color: var(--color-texto);
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }

        #pantalla-menu {
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; box-sizing: border-box; height: 100vh;
            overflow-y: auto;
        }

        .cabecera {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 700px; margin-bottom: 30px;
        }

        .cabecera h1 { margin: 0; color: #4CAF50; font-size: 3rem; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        #btn-tema { background: none; border: none; font-size: 2rem; cursor: pointer; }

        .grid-juegos {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            width: 100%; max-width: 700px;
        }

        .btn-juego {
            height: 90px; border-radius: 12px;
            border: 1px solid var(--color-borde);
            background-color: var(--bg-btn);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            color: var(--color-texto); font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease;
            text-align: center;
        }

        .btn-juego:hover {
            transform: translateY(-4px);
            border-color: var(--brillo-hover);
            box-shadow: 0 0 15px var(--brillo-hover);
            color: #4CAF50;
        }

        #pantalla-juego {
            display: none; flex-direction: column; height: 100vh; width: 100vw;
            background-color: #000;
        }

        .barra-juego {
            display: flex; justify-content: space-between; padding: 10px 20px;
            background: #1a1a1a; align-items: center; border-bottom: 1px solid #333;
            height: 60px; box-sizing: border-box;
        }

        .btn-accion {
            padding: 8px 18px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; color: white;
        }
        .rojo { background-color: #e53935; }
        .azul { background-color: #1DA1F2; }

        .contenedor-iframe {
            flex-grow: 1; width: 100%; height: calc(100vh - 60px);
            background-color: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-compartir-menu {
            margin-top: 25px; background-color: #1DA1F2; color: white;
            border: none; padding: 12px 30px; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-compartir-menu:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="pantalla-menu">
        <div class="cabecera">
            <h1>Classroom</h1>
            <button id="btn-tema" onclick="cambiarTema()" title="Cambiar Tema">🌗</button>
        </div>

        <div class="grid-juegos">
            <div class="btn-juego" onclick="abrirJuego('https://retro-bowl-unblocked1.github.io/')">Retro Bowl</div>
            <div class="btn-juego" onclick="abrirJuego('https://y8.com/embed/slope')">Slope</div>
            <div class="btn-juego" onclick="abrirJuego('https://tetris.com/play-tetris')">Tetris</div>
            <div class="btn-juego" onclick="abrirJuego('https://wayou.github.io/t-rex-runner/')">Chrome Dino</div>
            <div class="btn-juego" onclick="abrirJuego('https://play.gamepix.com/tap-goal/embed')">Tentrix</div>
            <div class="btn-juego" onclick="abrirJuego('https://sz-games.github.io/Ice-Dodo/')">More Games</div>
            
            <div class="btn-juego" onclick="abrirJuego('https://www.google.com/logos/2010/pacman10-i.html', true)">Pac-Man Oficial</div>
            <div class="btn-juego" onclick="abrirJuego('https://sites.google.com/site/populardoodlegames/tap-goal', true)">Tap Goal</div>
            <div class="btn-juego" onclick="abrirJuego('https://skibiditoilet.io/', true)">Skibidi Toilet</div>
        </div>

        <button class="btn-compartir-menu" onclick="compartirWeb()">📲 Compartir Web</button>
    </div>

    <div id="pantalla-juego">
        <div class="barra-juego">
            <button class="btn-accion rojo" onclick="cerrarJuego()">⬅ Volver</button>
            <button class="btn-accion azul" onclick="compartirWeb()">📲 Compartir</button>
        </div>
        <div class="contenedor-iframe">
            <iframe id="iframe-juego" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function abrirJuego(url, requiereNuevaPestana = false) {
            if (requiereNuevaPestana) {
                // Intenta abrir el juego en una pestaña nueva
                let nuevaVentana = window.open(url, '_blank');
                
                // Si el navegador bloquea la pestaña, salta este aviso:
                if (!nuevaVentana) {
                    alert("⚠️ Tu navegador ha bloqueado la ventana emergente.\n\nPor favor, mira en la barra de direcciones arriba a la derecha, haz clic en el icono de 'Pop-up bloqueado' y dale a 'Permitir'.");
                }
            } else {
                // Abre el juego dentro del camuflaje
                document.getElementById('pantalla-menu').style.display = 'none';
                document.getElementById('pantalla-juego').style.display = 'flex';
                document.getElementById('iframe-juego').src = url;
            }
        }

        function cerrarJuego() {
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-menu').style.display = 'flex';
            document.getElementById('iframe-juego').src = '';
        }

        function cambiarTema() {
            document.body.classList.toggle('modo-claro');
        }

        function compartirWeb() {
            navigator.clipboard.writeText(window.location.href);
            alert('¡Enlace copiado!');
        }
    </script>
</body>
</html>
